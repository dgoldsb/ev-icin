<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ev İçin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Ev İçin</h1>
  </header>
  <main>
    <nav class="toc">
      <h2>Tarifler / Recipes</h2>
      <ul id="recipe-list">
        <li class="loading">Loading…</li>
      </ul>
    </nav>
  </main>
  <script>
    fetch('index.json')
      .then(r => r.json())
      .then(recipes => {
        const list = document.getElementById('recipe-list');
        list.innerHTML = recipes.map(r => `
          <li>
            <a href="recipe.html?id=${r.slug}">
              <span>${r.name_tr} — ${r.name_en}</span>
              <span class="page-num">p. ${r.page}</span>
            </a>
          </li>
        `).join('');
      })
      .catch(() => {
        document.getElementById('recipe-list').innerHTML =
          '<li class="error">Could not load recipe list.</li>';
      });
  </script>
</body>
</html>
