<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ev İçin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="page-nav" id="page-nav" aria-label="Recipe navigation"></nav>
    <div class="header-row">
      <h1 id="title">…</h1>
      <a id="lang-toggle" class="lang-toggle"></a>
    </div>
  </header>
  <main id="content"></main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const lang = params.get('lang') === 'en' ? 'en' : 'tr';
    const suffix = lang === 'tr' ? '_tr' : '_en';

    document.documentElement.lang = lang;

    function toggleURL() {
      const next = new URLSearchParams(window.location.search);
      lang === 'tr' ? next.set('lang', 'en') : next.delete('lang');
      return `?${next.toString()}`;
    }

    function recipeURL(slug) {
      const next = new URLSearchParams();
      next.set('id', slug);
      if (lang === 'en') next.set('lang', 'en');
      return `?${next.toString()}`;
    }

    if (!id) {
      document.getElementById('title').textContent = 'Recipe not found';
    } else {
      Promise.all([
        fetch(`recipes/${id}.json`).then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('index.json').then(r => r.json())
      ])
        .then(([recipe, index]) => {
          render(recipe);
          renderNav(index);
        })
        .catch(() => {
          document.getElementById('title').textContent = 'Recipe not found';
          document.getElementById('content').innerHTML = '<p>Could not load this recipe.</p>';
        });
    }

    function render(r) {
      const name = r[`name${suffix}`];
      const ingredients = r[`ingredients${suffix}`];
      const instructions = r[`instructions${suffix}`];
      const notes = r[`notes${suffix}`];

      document.title = `${name} — Ev İçin`;
      document.getElementById('title').textContent = name;

      const toggle = document.getElementById('lang-toggle');
      toggle.href = toggleURL();
      toggle.textContent = lang === 'tr' ? 'English' : 'Türkçe';

      const headings = lang === 'tr'
        ? { ingredients: 'Malzemeler', instructions: 'İşlemler', note: 'Not', variation: 'Çeşit' }
        : { ingredients: 'Ingredients', instructions: 'Instructions', note: 'Note', variation: 'Variation' };

      let html = `
        <section class="recipe-content">
          <h2>${headings.ingredients}</h2>
          <ul>
            ${ingredients.map(i => `<li>${i}</li>`).join('\n            ')}
          </ul>

          <h2>${headings.instructions}</h2>
          <ol>
            ${instructions.map(s => `<li>${s}</li>`).join('\n            ')}
          </ol>
      `;

      if (notes) {
        html += `\n          <p class="recipe-note"><strong>${headings.note}:</strong> ${notes}</p>`;
      }

      if (r.variations && r.variations.length > 0) {
        r.variations.forEach(v => {
          const vname = v[`name${suffix}`];
          const vdesc = v[`description${suffix}`];
          html += `
          <h3>${headings.variation}: ${vname}</h3>
          <p>${vdesc}</p>`;
        });
      }

      html += `\n        </section>
        <p class="page-source">p. ${r.page}</p>`;

      document.getElementById('content').innerHTML = html;
    }

    function renderNav(index) {
      const i = index.findIndex(r => r.slug === id);
      const prev = index[i - 1] ?? null;
      const next = index[i + 1] ?? null;

      const prevLink = prev
        ? `<a class="page-nav-arrow" href="${recipeURL(prev.slug)}" title="p. ${prev.page}">←</a>`
        : `<span class="page-nav-arrow page-nav-disabled">←</span>`;

      const nextLink = next
        ? `<a class="page-nav-arrow" href="${recipeURL(next.slug)}" title="p. ${next.page}">→</a>`
        : `<span class="page-nav-arrow page-nav-disabled">→</span>`;

      document.getElementById('page-nav').innerHTML =
        `${prevLink}<a class="page-nav-index" href="index.html">Ev İçin</a>${nextLink}`;
    }
  </script>
</body>
</html>
